name: Nightly

on:
  workflow_dispatch:
  schedule:
    - cron: "0 18 * * *" # UTC 18:00 = 北京时间凌晨 2:00
  push:
    branches:
      - nightly

concurrency:
  group: nightly
  cancel-in-progress: true

jobs:
  sync:
    name: Sync from main
    if: github.event_name == 'schedule'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
        with:
          ref: nightly
          fetch-depth: 0

      - name: Merge main into nightly
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git merge origin/main --no-edit
          git push

  prepare:
    name: Prepare version
    needs: [sync]
    if: ${{ always() && !failure() && !cancelled() }}
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.ver.outputs.version }}
      sha: ${{ steps.ver.outputs.sha }}
    steps:
      - uses: actions/checkout@v6
        with:
          ref: nightly

      - name: Compute version
        id: ver
        run: |
          SHA=$(git rev-parse HEAD)
          SHORT_SHA=$(git rev-parse --short HEAD)
          VERSION="nightly-$(date -u +%Y%m%d)-${SHORT_SHA}"
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "sha=${SHA}" >> $GITHUB_OUTPUT

  build-desktop:
    name: Desktop (${{ matrix.platform }})
    needs: [prepare]
    if: ${{ always() && !failure() && !cancelled() }}
    runs-on: ${{ matrix.os }}
    env:
      VERSION: ${{ needs.prepare.outputs.version }}
    strategy:
      matrix:
        include:
          - os: macos-latest
            goos: darwin
            goarch: arm64
            platform: darwin-arm64
          - os: macos-latest
            goos: darwin
            goarch: amd64
            platform: darwin-amd64
          - os: ubuntu-22.04
            goos: linux
            goarch: amd64
            platform: linux-amd64
          - os: windows-latest
            goos: windows
            goarch: amd64
            platform: windows-amd64
    steps:
      - uses: actions/checkout@v6
        with:
          ref: nightly

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - uses: pnpm/action-setup@v5
        with:
          version: 10

      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: "pnpm"
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Install frontend dependencies
        run: cd frontend && pnpm install --frozen-lockfile

      - name: Install Wails CLI
        run: go install github.com/wailsapp/wails/v2/cmd/wails@latest

      - name: Install Linux dependencies
        if: matrix.goos == 'linux'
        run: sudo apt-get update && sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.0-dev

      - name: Build embedded opsctl
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: go build -ldflags="-s -w -X github.com/cago-frame/cago/configs.Version=${{ env.VERSION }}" -o ./internal/embedded/opsctl_bin ./cmd/opsctl/

      - name: Build desktop app
        run: wails build -platform ${{ matrix.goos }}/${{ matrix.goarch }} -ldflags="-s -w -X github.com/cago-frame/cago/configs.Version=${{ env.VERSION }}" -tags embed_opsctl

      - name: Package (Unix)
        if: matrix.goos != 'windows'
        run: |
          if [ "${{ matrix.goos }}" = "darwin" ]; then
            tar -czf opskat-${{ matrix.platform }}.tar.gz -C build/bin opskat.app
          else
            tar -czf opskat-${{ matrix.platform }}.tar.gz -C build/bin opskat
          fi

      - name: Package (Windows)
        if: matrix.goos == 'windows'
        shell: pwsh
        run: Compress-Archive -Path build/bin/opskat.exe -DestinationPath opskat-${{ matrix.platform }}.zip

      - uses: actions/upload-artifact@v7
        with:
          name: nightly-opskat-${{ matrix.platform }}
          path: opskat-${{ matrix.platform }}.*

  release:
    name: Update Nightly Release
    needs: [prepare, build-desktop]
    if: ${{ always() && !failure() && !cancelled() }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6

      - uses: actions/download-artifact@v8
        with:
          path: artifacts
          pattern: nightly-*
          merge-multiple: true

      - name: Generate checksums
        run: cd artifacts && sha256sum * > SHA256SUMS.txt

      - name: Update nightly release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release delete nightly -y --cleanup-tag 2>/dev/null || true
          gh release create nightly --prerelease \
            --target ${{ needs.prepare.outputs.sha }} \
            --title "${{ needs.prepare.outputs.version }}" \
            --notes "Nightly build from \`nightly\` branch
          Commit: ${{ needs.prepare.outputs.sha }}
          Date: $(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            artifacts/*
